<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="popup.css" />
    <title>LoomLess Studio</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img
          src="../icons/icon48.png"
          alt="LoomLess Studio"
          class="logo" />
        <h1>🎥 LoomLess Studio</h1>
      </div>
      <p class="tagline">Privacy-First Screen Recording Studio</p>
      <p class="keyline">YOUR VIDEO NEVER LEAVES YOUR DEVICE</p>
      <button
        id="startRecordingBtn"
        class="record-btn">
        <span class="btn-icon">🔴</span>
        <span>Start Recording</span>
      </button>
      <div class="footer">
        <p>🚫 No sign-up • 💸 No payment • ☁️ No cloud</p>
        <div class="developer-links">
          <span class="developer-links-label">More from Developer</span>
          <div class="developer-link-icons">
            <a
              href="https://pizbot.com"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Visit Pizbot">
              <img
                src="../public/pizbot.webp"
                alt="Pizbot"
                class="developer-icon developer-icon-pizbot" />
            </a>
          </div>
        </div>
        <div class="credit">
          Built with 💜 by
          <a
            href="https://moayaan.com"
            target="_blank"
            rel="noopener noreferrer"
            >♦moayaan.eth♦</a
          >
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
