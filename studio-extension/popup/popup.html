<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="popup.css" />
    <title>LoomLess Studio</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img
          src="../icons/icon48.png"
          alt="LoomLess"
          class="logo" />
        <h1>LoomLess</h1>
      </div>
      <button
        id="startRecordingBtn"
        class="record-btn">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"></circle>
            <circle cx="12" cy="12" r="4.5" fill="currentColor"></circle>
          </svg>
        </span>
        <span>Open Recorder</span>
      </button>
      <p class="section-label">Also Check Out:</p>
      <a
        href="https://imanvibes.vercel.app"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Visit ImanVibes"
        class="developer-link">
        <img
          src="../public/imanvibes.png"
          alt="ImanVibes"
          class="developer-icon" />
        <span>ImanVibes</span>
      </a>
      <div class="credit">
        Built by
        <a
          href="https://moayaan.com"
          target="_blank"
          rel="noopener noreferrer"
          >moayaan.eth</a
        >
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
