<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoomLess AI Chat</title>
    <link rel="stylesheet" href="./chat.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="chat-shell">
      <section class="chat-panel">
        <header class="chat-header">
          <div class="title-wrap">
            <img src="./icon.png" alt="LoomLess AI" class="header-brand-icon" />
            <div>
              <h2>LoomLess GPT</h2>
              <p id="chat-status" class="status-hidden" aria-live="polite"></p>
            </div>
          </div>

          <div class="header-actions">
            <button id="model-picker-btn" class="ghost-btn model-picker-btn" aria-expanded="false">
              <img id="active-model-icon" class="model-picker-icon" src="./icon.png" alt="" />
              <span id="model-picker-label">Model</span>
              <span class="model-picker-chevron" aria-hidden="true">▾</span>
            </button>
          </div>
        </header>

        <div id="chat-messages" class="chat-messages"></div>

        <footer class="composer">
          <div class="composer-box">
            <textarea id="chat-input" rows="1" placeholder="Ask anything..."></textarea>
            <div class="composer-right">
              <button id="web-search-toggle" type="button" class="web-toggle" aria-pressed="false">
                <span class="web-toggle-dot"></span>
                <span>Web</span>
              </button>
              <button id="send-btn" class="primary-btn">Send</button>
            </div>
          </div>
          <div class="composer-actions">
            <span class="hint">Press Enter to send · Shift + Enter for new line</span>
          </div>
        </footer>
      </section>

      <section id="model-picker-popover" class="model-picker-popover" hidden>
        <div class="model-popover-header">
          <p>Pick a model</p>
        </div>
        <div id="missing-icons" class="missing-icons" hidden></div>
        <div id="model-list" class="model-list"></div>
      </section>

      <section id="sources-modal" class="sources-modal" hidden>
        <div id="sources-backdrop" class="sources-backdrop"></div>
        <div class="sources-dialog" role="dialog" aria-modal="true" aria-labelledby="sources-title">
          <header class="sources-header">
            <div>
              <h3 id="sources-title">Web Sources</h3>
              <p id="sources-query" class="sources-query"></p>
            </div>
            <button id="sources-close-btn" type="button" class="ghost-btn">Close</button>
          </header>
          <div id="sources-list" class="sources-list"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./chat.js"></script>
  </body>
</html>
