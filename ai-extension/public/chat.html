<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoomLess AI Chat</title>
    <link rel="stylesheet" href="./chat.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="chat-shell">
      <aside class="side-panel">
        <div class="brand">
          <img src="./icon.png" alt="LoomLess AI" class="brand-icon" />
          <div>
            <p class="brand-kicker">LoomLess</p>
            <h1>Chat with LoomLess AI</h1>
          </div>
        </div>

        <p class="side-copy">
          Your general AI workspace. Explore ideas, drafts, and current topics in one place.
        </p>

        <div class="quick-section">
          <p class="quick-title">Discover</p>
          <button class="quick-chip" data-prompt="What are the top AI updates today in simple terms?">
            Top AI updates today
          </button>
          <button class="quick-chip" data-prompt="Give me a concise startup and tech market brief in 5 bullets.">
            Startup market brief
          </button>
          <button class="quick-chip" data-prompt="Help me write a polished LinkedIn post about building products with AI.">
            LinkedIn post idea
          </button>
        </div>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <h2>New Chat</h2>
            <p id="chat-status">Ready.</p>
          </div>
          <div class="header-actions">
            <button id="copy-last-btn" class="ghost-btn">Copy Last</button>
            <button id="clear-chat-btn" class="ghost-btn">Clear</button>
          </div>
        </header>

        <div id="chat-messages" class="chat-messages"></div>

        <footer class="composer">
          <textarea
            id="chat-input"
            placeholder="Ask anything... (Cmd/Ctrl + Enter to send)"
          ></textarea>
          <div class="composer-actions">
            <span class="hint">Press Cmd/Ctrl + Enter to send</span>
            <button id="send-btn" class="primary-btn">Send</button>
          </div>
        </footer>
      </section>
    </main>

    <script type="module" src="./chat.js"></script>
  </body>
</html>
